<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hat over Hate</title>
    <style>
        :root {
            --rust: #c0442a;
            --forest: #2d4a3e;
            --cream: #f5f0e8;
            --charcoal: #2a2a2a;
        }
        body {
            font-family: 'Playfair Display', serif;
            background-color: var(--cream);
            color: var(--charcoal);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .logo-container {
            text-align: center;
        }
        .symbol {
            width: 200px;
            height: 200px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <svg class="symbol" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <!-- Hat Shape -->
            <path d="M20,70 Q50,20 80,70 L85,75 L15,75 Z" fill="none" stroke="var(--rust)" stroke-width="4"/>
            <!-- H@ Over H8 -->
            <text x="50" y="55" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="var(--forest)">H@ / H8</text>
            <!-- Slogan Circle -->
            <circle cx="50" cy="50" r="45" fill="none" stroke="var(--forest)" stroke-width="1" stroke-dasharray="2,2"/>
        </svg>
        <h1>Hat over Hate</h1>
        <p>H@ / H8</p>
    </div>
</body>
</html>
